org.gradle.jvmargs=-Xmx3G -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configuration-cache=false

# Kotlin compiler settings to fix incremental cache issues
kotlin.incremental=false
kotlin.daemon.jvmargs=-Xmx1G

# AndroidX settings
android.useAndroidX=true
android.enableJetifier=true

# Suppress obsolete Java warnings
android.suppressUnsupportedCompileSdk=35

# Kotlin compiler settings
kotlin.code.style=official
kotlin.compiler.suppressWarnings=true
kotlin.compiler.allWarningsAsErrors=false
